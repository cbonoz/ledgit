<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#f9fafb"/>
  <rect x="400" y="80" width="400" height="80" rx="16" fill="#4f46e5"/>
  <text x="600" y="130" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="white" text-anchor="middle">L</text>
  <text x="600" y="240" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#111827" text-anchor="middle">LEDGIT</text>
  <text x="600" y="275" font-family="system-ui,sans-serif" font-size="16" fill="#9ca3af" text-anchor="middle">Verifiable Human-Authorized Audit Trails for AI Agents</text>

  <!-- Button cards -->
  <rect x="250" y="330" width="320" height="90" rx="16" fill="white" stroke="#e5e7eb" stroke-width="2"/>
  <text x="280" y="370" font-size="24">👤</text>
  <text x="280" y="395" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#111827">I'm a Human</text>
  <text x="280" y="410" font-family="system-ui,sans-serif" font-size="12" fill="#9ca3af">Review on Ledger, bring your own ENS name</text>

  <rect x="630" y="330" width="320" height="90" rx="16" fill="white" stroke="#e5e7eb" stroke-width="2"/>
  <text x="660" y="370" font-size="24">🤖</text>
  <text x="660" y="395" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#111827">I'm an Agent</text>
  <text x="660" y="410" font-family="system-ui,sans-serif" font-size="12" fill="#9ca3af">Propose actions, see what's available</text>

  <!-- Comparison table -->
  <rect x="200" y="460" width="800" height="200" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="230" y="490" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#9ca3af" letter-spacing="1">WITHOUT VS WITH LEDGIT</text>
  <line x1="230" y1="505" x2="970" y2="505" stroke="#f3f4f6" stroke-width="1"/>
  <text x="230" y="530" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#111827">Human oversight</text>
  <text x="500" y="530" font-family="system-ui,sans-serif" font-size="12" fill="#f87171">None or weak prompts</text>
  <text x="720" y="530" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#059669">Hardware-signed approval</text>
  <line x1="230" y1="545" x2="970" y2="545" stroke="#f3f4f6" stroke-width="1"/>
  <text x="230" y="570" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#111827">Audit trail</text>
  <text x="500" y="570" font-family="system-ui,sans-serif" font-size="12" fill="#f87171">Basic logs, easy to fake</text>
  <text x="720" y="570" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#059669">Immutable on Hedera HCS</text>
  <line x1="230" y1="585" x2="970" y2="585" stroke="#f3f4f6" stroke-width="1"/>
  <text x="230" y="610" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#111827">Proof</text>
  <text x="500" y="610" font-family="system-ui,sans-serif" font-size="12" fill="#f87171">"The agent said so"</text>
  <text x="720" y="610" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#059669">Provable human signature</text>
</svg>
